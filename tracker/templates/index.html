<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Educational phishing campaign</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    .card {
      text-align: center;
      padding: 3rem 3.5rem;
      border-radius: 16px;
      background: #1e293b;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      max-width: 40rem;
    }
    h1 { margin: 0 0 1rem; font-size: 2rem; }
    p { margin: 0.5rem 0; color: #cbd5e1; line-height: 1.5; }
  </style>
</head>
<body>
  <main class="card">
    <h1>You have clicked on an educational phishing link.</h1>
    <p>If this email has caused suspicion, please report it to the information security department.</p>
  </main>
</body>
</html>
