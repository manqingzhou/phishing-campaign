# nginx config for the click tracker.
#
# Two server blocks:
#   :8084  public  — only `GET /` is proxied to the app; everything else → 404.
#   :8085  admin   — proxies /admin/clicks to the app's /clicks. Published by
#                    compose on 127.0.0.1 only (host-loopback), so it is not
#                    reachable off-box. The app additionally requires X-Admin-Key.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # A readable access log format that also captures the forwarded client IP.
    log_format tracker '$remote_addr - [$time_local] "$request" '
                       'status=$status bytes=$body_bytes_sent '
                       'xff="$http_x_forwarded_for" ua="$http_user_agent"';

    # Log to BOTH the container stdout/stderr (for `docker compose logs -f`)
    # AND to files on a mounted volume (so history survives container removal).
    access_log /dev/stdout tracker;
    access_log /var/log/nginx/access.log tracker;
    error_log  /dev/stderr warn;
    error_log  /var/log/nginx/error.log warn;

    # Real-IP headers so the app captures the true client address. The app
    # reads X-Forwarded-For (first hop) then X-Real-IP.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 5s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    upstream tracker_app {
        server tracker:8000;
    }

    # ---- Public entrypoint --------------------------------------------------
    server {
        listen 8084;
        server_tokens off;

        # Only the tracker landing route is public.
        location = / {
            proxy_pass http://tracker_app/;
        }

        # Health endpoint — served directly by nginx, NOT proxied to the
        # tracker. The compose healthcheck polls this so it neither logs
        # an access line nor writes a phantom click row to clicks.db.
        location = /nginx-health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # Block everything else publicly (/clicks, /health, etc.).
        location / {
            return 404;
        }
    }

    # ---- Admin entrypoint (loopback-only via compose port binding) ----------
    server {
        listen 8085;
        server_tokens off;

        # Expose the app's /clicks under an /admin/ prefix.
        location = /admin/clicks {
            proxy_pass http://tracker_app/clicks;
        }

        location / {
            return 404;
        }
    }
}
