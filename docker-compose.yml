services:
  tracker:
    build: ./tracker
    environment:
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      DB_PATH: /data/clicks.db
    volumes:
      - ./tracker/data:/data  # SQLite DB on the host (tracker/data/clicks.db)
    # Internal-only healthcheck (uses Python stdlib; no curl in image).
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    # No published ports: the app is only reachable via nginx on the compose net.
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/logs:/var/log/nginx           # persist access/error logs on host
    ports:
      - "8084:8084"            # public entrypoint
      - "127.0.0.1:8085:8085"  # admin, host-loopback only
    # Detect when nginx stops serving: unhealthy shows in `docker compose ps`.
    # Hits the in-nginx /nginx-health endpoint so it does NOT proxy to the
    # tracker (avoids spamming the click log + DB with self-pings).
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8084/nginx-health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    depends_on:
      tracker:
        condition: service_healthy
    restart: unless-stopped

  # Mail Service: stdlib-only Python CLI. Runs idle so the compose stack
  # contains the Mail Service ingredient; drive it with `docker compose exec`:
  #
  #   docker compose exec mailer python send_campaign.py \
  #       mailer/recipients.example.csv --provider gmail
  #
  # The .env on the host is bind-mounted so SMTPConfig picks up SMTP_USERNAME,
  # SMTP_PASSWORD, SMTP_PROXY, etc. Proxy reachability note: 127.0.0.1 inside
  # the container refers to the container itself, so when SMTP_PROXY points at
  # a proxy on the host, use `http://host.docker.internal:15236` (works on
  # Docker Desktop and on Linux via the `extra_hosts` mapping below).
  mailer:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./mailer:/app/mailer:rw
      - ./.env:/app/.env:ro
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["python", "-c", "import time; time.sleep(2147483647)"]
    restart: unless-stopped
